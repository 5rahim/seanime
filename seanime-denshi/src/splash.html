<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="#0c0c0c" name="theme-color">
    <title>Seanime</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #070707;
            color: #f4f4f5;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            user-select: none;
            -webkit-app-region: drag;
        }
        
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .splash {
            position: relative;
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at 45% 35%, rgba(61, 90, 254, 0.10), transparent 26%),
            radial-gradient(circle at 55% 57%, rgba(255, 128, 171, 0.08), transparent 28%),
            #070707;
        }
        
        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .logo {
            width: 104px;
            height: 104px;
            object-fit: contain;
            filter: drop-shadow(0 18px 34px rgba(0, 0, 0, 0.35));
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        .title {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0;
            color: rgba(244, 244, 245, 0.76);
        }
        
        .dots {
            display: inline-flex;
            width: 32px;
            justify-content: space-between;
        }
        
        .dots span {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(244, 244, 245, 0.48);
            animation: blink 1.2s ease-in-out infinite;
        }
        
        .dots span:nth-child(2) {
            animation-delay: 0.16s;
        }
        
        .dots span:nth-child(3) {
            animation-delay: 0.32s;
        }
        
        @keyframes pulse {
            
            0%,
            100% {
                opacity: 0.72;
                transform: scale(1);
            }
            
            50% {
                opacity: 1;
                transform: scale(1.035);
            }
        }
        
        @keyframes blink {
            
            0%,
            100% {
                opacity: 0.32;
                transform: translateY(0);
            }
            
            50% {
                opacity: 1;
                transform: translateY(-2px);
            }
        }
    </style>
</head>

<body>
<main aria-label="Seanime is starting" class="splash">
    <div class="content">
        <img alt="" class="logo" src="../assets/512x512.png">
        <div class="title">Seanime</div>
        <div aria-hidden="true" class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</main>
</body>

</html>
